    {img:'testi_1417773164.jpg',name:'Muhd. Afif Farhan',age:'4',location:'Kedah',problem:'Unable to walk and stand for long and often get fevers',before:'Since young, Afif have difficulty in walking and standing. This is due to the physical tibia and his feet were smaller than normal. He also often got fevers and looks pale just like anemia.',after:'After taking Golden Clam® and Springlife™ for 2 weeks, the skin shows redness, his feet and tibia seem to grow and plump. He started to get up and show the spirit of diligent to walk. Finally, he was able to walk on his own, even smiles appear on his face again.'},
    {img:'testi_1417773488.jpg',name:'Nuraisyah Fatihah Bt. Baharuddin',age:'19',location:'Kedah',problem:'Thalassemia',before:'I was diagnosed with Thalassemia since childhood. Because of this, I often feel less energetic and sleepy. In addition, the need of blood transfusions (2 packets) every month makes me miserable!',after:'After a month consumed Golden Clam &amp; Springlife, I felt more energetic. After second month, I only need to do blood transfusions once a month to replenish my red blood cell supply. After the eight months,  the number of blood transfusions has also been reduced  to every two months.'},
    {img:'testi_1417773999.jpg',name:'Thum Siew Sin',age:'82',location:'Johor',problem:'Stroke',before:'In April 2012, I suddenly fainted and was sent to the clinic for a checkup. The doctor said my blood pressure is too high (over 180) and gave me some medicine. After returning home, I seem to suffer from dementia and was unable to walk. My daughter let me consume Golden Clam® and Springlife™, I recovery of consciousness on the next day.  After that, another daughter of mine took me to the hospital for further examination. According to the doctor, I had a stroke on my left side and was admitted to the hospital for 2 days. After being discharged from the hospital, I had to take medication to lower my blood pressure and was advised to go back to the hospital for Physiotherapy on a regular basis.',after:'My family took me for acupuncture treatment. In addition, I consume 4 tablets of Golden Clam®, 2 tablets of Cal Plus and Springlife™ daily. After a week, my legs can be lifted and I was able to walk with crutches. After 3 months, I can move freely and travel to Genting Highlands with my family. Thank you Greeno® for restoring my health.'},
    {img:'testi_1417774213.jpg',name:'Hajah Radziah Zakaria',age:'59',location:'Kedah',problem:'Diabetes, High Blood Pressure, fingers numbness',before:'I had suffered from Diabetes for more than 10 years and must inject insulin to control my blood sugar levels. My fingers often felt numbness and stiffness causes I could not fall asleep. Besides that, I’m facing problem of getting up if sitting on the floor, my right thigh and tibia often felt painful and less of energy. Furthermore, my heart is beating fast make me feel uneasy.',after:'After finished 2 bottles of Springlife® in 4 days, there is some improvement in my fingers numbness. One month after I consumed Golden Clam® and Springlife®, I managed to control my blood sugar level without injection of insulin. In addition, my heart beats has back to normal. Now I can sleep better at night. Thanks GREENO®!'},
    {img:'testi_1417774413.jpg',name:'Lim Yoke Theng',age:'32',location:'Johor',problem:'Thyroid and Infertility',before:'In 2008, I was diagnosed with thyroid when the inexplicable trembling hands, swollen and redness feet appeared on me. Since then, I was required to consume 10 tablets of medication every day. After taking the medication, I groggy all day in bed, not dining and even sent to the hospital for allergy testing due to I’m allergic to the medication.   After being discharged from the hospital, my medication increased to 11 tablets a day. Although thyroid index has decreased, my face was covered with acne, looks gaunt, feel dizziness every day, unable to work and whatever I eat are bitter! I almost get neurosis because of this and often crying in the middle of the night. In order to alleviate the pain, I began to seek traditional treatment and taking other health care products, but the results are disappointing. Due to unbearable pain of the private part of my body and bloated looks, Chinese Physician once suspected that I had cervical cancer. In recent years, I can not get pregnant even though I did not contraception, I can not wait to have another baby. After the traditional treatment, I\'m pregnant in July 2010 but suffered a miscarriage in September 2010. According to the doctor, the probability of miscarriage is high if I get pregnant again.',after:'In December 2010, I began to consume 4 tablets of Golden Clam® each morning and night daily when Poh Yin - Greeno® Blue Diamond Director introduced the product to me. It is beyond my expectations! I can see the effectiveness in just a month. When I go for a follow-up check-up, the report indicated that my thyroid index has resumed to normal. At the same time, I was pregnant again! This time, I managed to keep my unborn child and he was born safely due to the consumption of Golden Clam®. Now, my son is already nine months old and he is a healthy and lovely baby. In addition, there is a great improvement in my health condition!'},
    {img:'testi_1417774506.jpg',name:'Nayef Bin Jamaluddin (5 months)',age:'0',location:'Perlis',problem:'Asthma',before:'Nayef was diagnosed with asthma among infants at his age of 3 months. Since then, his parents had been bringing him to the clinic constantly for nebulizer treatment. Although 8 treatments have been done, there is no improvement in his condition.',after:'On 17/05/2012, his father overheard the radio program about products of Greeno®. So, they rushed to the Holiday Villa Hotel and met Dr. Zulkifli. He has suggested Nayef to consume 30 drops of Springlife™ daily. As Nayef is still breast-feeding, Dr.Zulkifli also suggested that his mother consume 2 tablets of Golden Clam® daily. Thank God! A week later, there are major changes in Nayef condition as he no longer cough, phlegmatic and flu. In addition, he can sleep through the night. Now, his weight had increased to 8.5kg at the age of 5 months compared to 4.3kg before consuming products of Greeno®. On 29/05/2012, his parents have brought Nayef for monthly check-up and the doctor on duty declared that Nayef has no longer suffered from asthma.'},
    {img:'testi_1421052228.jpg',name:'Salleh Bin Ali',age:'53',location:'Sabah',problem:'Gout, Diabetes,  High Blood Pressure &amp; Gastric',before:'I was suffered from gout and diabetes for more than 10 years. Besides that, I also had high blood pressure which reached &gt; 200mm/Hg. I was hospitalized due to these health problems. After that, I was unable to walk for around 3 months. In the mean time, I need to take medication for gout, diabetes, high blood pressure and gastric.',after:'When I was hospitalized, my friend introduced the GREENO® Golden Clam® to me. I started to take 3 tablets of GREENO® Golden Clam® at each morning and night. After 10 boxes of consumption, I am able to walk and my blood pressure also dropped to 130mm/Hg and 75mm/Hg, my blood sugar index also dropped from 18mmol/L to 5.4mmol/L.'},
    {img:'testi_1467612241.jpg',name:'Sim Lily',age:'41',location:'Johor',problem:'Stroke, Hypertension, Diabetes, Numbness on Legs &amp; hands',before:'I had suffered from pregnancy hypertension and diabetes since10 years ago. I need to rely on traditional herbs to control these disease. Unfortunately, In May 2008 I was getting stroke due to high blood. It caused me become partial paralysis , mouth crooked and unable to speak and move my hands and feet. I only can lying on the bed all day long.',after:'I started to consume Golden Clam and N5 after someone introduced these products to my husband, my three fingers can move after 2 days. 10 days after, My bone nerves and mouth crooked problem getting better and I can spoke finally. After 2 months, my hands and feet can be moved and fully recovered after 3 months'},
    {img:'testi_1421052293.jpg',name:'Lee Kin Chong',age:'37',location:'Johor',problem:'Carrier of hepatitis B',before:'I was diagnosed as carrier of Hepatitis B during blood donation since 10 years ago.',after:'I started to consume GREENO® Golden Clam® after introduced by my friend on May 2008. At May 2010, my body check up showed that the Hepatitis B virus had been removed. My wife and I were so happy with the result. On the other hand, at early of 2009, my wife was pregnant with third child, she take a lot of GREENO® Golden Clam® during her pregnancy, when my son was born, we found that he got very thick and black hair. (  my elder and second son only had little hair when they were born. )My third son also seldom fall in sick within a year even after vaccination. Thanks GREENO® Golden Clam® for such excellent product!'},
    {img:'testi_1421052415.jpg',name:'Siow Kim Chong',age:'63',location:'Negeri Sembilan',problem:'Diabetes, High Blood Pressure, Thyroid',before:'I had been suffered from diabetes for 10 years and I’d been taking medication. My right leg was swelling due to the heat in body cannot be appeased.  I faced difficulty to walk as the tightness of the swollen leg. I also suffered from high blood pressure for 5 to 6 years, I had been hospitalized for dripping due to my blood pressure hit to 200mm/Hg.  Besides that, I was suffered from difficulty of breath and thyroid, there is a tumor near my necks.',after:'After 3 months of consumption of 3 tablets of GREENO® Golden Clam®  at each morning and night. I was so surprised that the tumor was disappeared , even the doctor also felt surprising. My condition of diabetes, swollen leg had been improved. My blood pressure also dropped from 200mm/Hg to 150mm/Hg and 80mm/Hg. Thanks GREENO® Golden Clam®  for its excellent effectiveness which bring back my health.'},
    {img:'testi_1421052468.jpg',name:'Tham Thoong Seng',age:'69',location:'Selangor',problem:'High Blood Pressure, Osteoporosis, Sinus Disorder',before:'I was retired and I suffered from osteoporosis since 2009. I also faced swollen and tightness at my legs. Besides that, my blood pressure index  also reached190mm/Hg and I was suffered from sinus disorder too.',after:'At Jan 2010,my friend recommended GREENO® Golden Clam®  to me. I bought 60 boxes in the first month. I started consume 3 tablets at each morning and night. A week later, my condition of sinus disorder and osteoporosis improved, even my blood pressure also dropped to 130mm/Hg.'},
    {img:'testi_1421052539.jpg',name:'Lin Kim Seong',age:'63',location:'Negeri Sembilan',problem:'High Blood Pressure, Stroke',before:'I worked in construction industry and I was suffered from high blood pressure for few years. Unfortunately, I was attacked by stroke during June 2010. I am unable to work, talk or even to move my body. Thus, I was hospitalized.',after:'On the third day of hospitalization, my friend brought me a box of GREENO® Golden Clam® . I started to consume 3 tablets at each morning and night. After a week, I am able to move slowly. With less than 3 months, I can move freely as before. GREENO® Golden Clam®  was definitely an excellent product!3 tablets for each morning and night was too few for me.'},
    {img:'testi_1421052618.jpg',name:'Kee Li Huang',age:'42',location:'Johor',problem:'Thyroid Hyperkinetic',before:'I was diagnosed with Thyroid Hyperkinetic since 10 years ago. Even though I had took 10 years medication, but there was no improvement. At year 2010, my doctor advise me to change the medication to “radiation water”, but I reject as I heard my sister’s friend had to go for dialysis after consume “radiation water”.',after:'I started to consume GREENO® Golden Clam®  on July 2010. It is very surprising that my thyroid stimulating hormone had return to normal level during my check-up on November 2011.'},
    {img:'testi_1421052682.jpg',name:'Lau Keen Meng',age:'44',location:'Cameron Highland',problem:'Back Pain, Rheumatism, Aches, Headache, Allergy ( bean ), Bloating, Tiredness',before:'As a plumber, I faced a lot of health problems before consume  GREENO® Golden Clam®. I felt headache and dizziness during hot weather. My back pain and rheumatism worsened after I take cold food. I cannot squat for longer time as I  will suffered from hemorrhoids, lack of energy, insomnia and felt tired.',after:'At 06.05.2010, my wife bought me a box of GREENO® Golden Clam®, I started to consume 2 tablets at morning and 3 tablets at night. Sometimes, I will increase the dosage. A week later, I felt the healing reaction. I regain my energy and no longer suffer from insomnia. My snoring also had been improved. Now, I never felt back pain after ate duck, ice,  teh tarik or during raining day. Thanks GREENO® Golden Clam® for bring back my health.'},
    {img:'testi_1421052795.jpg',name:'Nurul',age:'26',location:'Kuala Lumpur',problem:'Bulging Disc, Asthma, Minor Thalassemia',before:'I was suffered from bulging disc since 2006. Before married, I always felt back pain at the spine and tired. I need to take pain killer to release my pain. I also suffered from asthma and minor Thalassemia.',after:'I consumed 3 boxes of GREENO® Golden Clam® in the first 20 days, with 3 tablets per day before sleep. My condition of back pain improved after the second day of consumption. I also took GREENO® Golden Clam® during my pregnancy, my son didn’t get jaundice when he was born and seldom fall in sick. Besides that, after my husband finished one box of GREENO® Golden Clam®, his sexual ability was improved.'},
    {img:'testi_1467094061.jpg',name:'Siow Wee Fen',age:'36',location:'Malacca',problem:'G6PD Deficiency',before:'I got the inherited G6PD ( glucose-6-phosphatase ) deficiency from my father. This is a common congenital disease. Due to the glucose cannot be break down naturally, thus sometimes I will suffered from hemolytic reaction and other symptoms like  tired, shortness of breath, heart failure, shock and even be life-threatening. Unfortunately, my elder son also been threaten by this disease ( According to genetic analysis, if the mother is confirmed patients, while the father is normal, thus the son will be the carrier of the gens, and the daughter will only got 50% of the chances to get it.',after:'When I was pregnant with my third child, I got to know Greeno Golden Clam through my sister. I started to consume 3 tablets at each morning and night. Although I only consumed for less than 3 months, very luckily my third son was free from this disease and didn’t have any jaundice when he was born. My elder son and second daughter had jaundice when they were born.'}

    {img:'testi_1570784505.jpg',name:'Hoo Kok Shin',age:'49',location:'森美兰',problem:'乙型肝炎携带者',before:'我的肝指数很高，可能导致肝硬化和肝癌。我尝试过很多保健品，但未见改善。',after:'了解黄金蚬后，我开始早晚各服用3粒。三个月后，肝指数显著下降：AST从127降到52，ALT从259降到87，GGT从82降到39。失眠问题也改善了！'},
    {img:'testi_1467168291.jpg',name:'Tan Meng Suan',age:'55',location:'吉打',problem:'系统性红斑狼疮',before:'我患SLE超过10年，经常呼吸困难、心脏问题、腿无力。晚上无法入睡。除了药物，还服用了蜂胶和初乳，但无改善。',after:'我开始每天早午晚各3粒黄金蚬，并每天喝3-4次Springlife。有时我会加量到每天12粒以减轻疼痛。几个月后情况好转，药量减少。六个月后，根据健康报告，SLE指数恢复正常，我不再需要药物。'},
    {img:'testi_1467164310.jpg',name:'Ling Heng Chiong',age:'50',location:'砂拉越',problem:'高血糖、高血压、高胆固醇、尿酸高',before:'我患尿酸、高血糖、高胆固醇和高血压已有25年。以前只要吃羊肉，第二天就因关节剧痛和腿肿无法行走。',after:'我开始早晚各3粒黄金蚬，并在饮水中加入10泵Springlife。现在尿酸100%恢复，胆固醇从7+降到4+，恢复正常。肤色也改善很多！'},
    {img:'testi_1453862444.jpg',name:'Tan Cho Huang',age:'63',location:'砂拉越',problem:'荷尔蒙问题',before:'4年前我被诊断出荷尔蒙问题并开始服用激素药物。我问医生要服用多久，他说5-6年甚至更长。我知道这不是办法。偶然参加黄金蚬餐会后了解了产品。我带了资料回家研究，下个月再次参加后疑虑消除，开始早晚各3粒黄金蚬。最后经医生许可，我停用了激素药物。',after:'我十多年的关节疼痛，蹲下是最害怕的动作，因为蹲下去就难站起来。我不敢手术因为不再年轻。后来我开始服用Spring Life和Cal Plus。每天喝的水都加Spring Life，Cal Plus午饭后2包。不知不觉一天和孙子玩耍时，我能轻松蹲下站起。太高兴了！我在此呼吁大家，服用保健品需要耐心。'},
    {img:'testi_1453864718.jpg',name:'Nevan Toh',age:'3',location:'砂拉越',problem:'皮肤敏感',before:'Nevan（由母亲Stephy Chua代表）有皮肤敏感问题。涂了医生给的药膏还是痒，越抓越痒。',after:'之后我将Spring Life涂在他的痒处。仅一周，肿胀和瘙痒就消失了。太开心了。'},
    {img:'testi_1453256325.JPG',name:'Sia Yik Tong',age:'58',location:'砂拉越',problem:'高尿酸',before:'我的尿酸很高，因为我是重度饮酒者。每年都要去医院打针稳定尿酸。',after:'从2012年开始，我知道黄金蚬可以在饮酒时保护肝脏，于是早晚各3粒。令人惊讶的是，尿酸得到控制，不再需要打针。另一个从小困扰我的胃病也解决了。有时夜里胃酸发作无法入睡，服用黄金蚬后胃炎也康复了。我现在快乐健康地生活。'},
    {img:'testi_1467081261.jpg',name:'Sia Ham Ping',age:'86',location:'砂拉越',problem:'胃癌',before:'我是癌症患者。2004年患胃癌康复。2015年初我发现经常发烧发冷，检查后CEA值为31mg/L（正常0-2.5），进一步CT扫描诊断为结肠癌。',after:'手术后我每天早晚各10粒黄金蚬，并4天喝1瓶Spring Life。恢复速度惊人，一个月后就可以像往常一样运动。复查时CEA为17mg/L（仍偏高）。不幸肝脏受影响并诊断为肝癌，再次手术恢复也很快。现在86岁的我仍然活着很开心。'},
    {img:'testi_1444891846.jpg',name:'Chan Foh Chin',age:'69',location:'森美兰',problem:'意外伤害、老年斑和皱纹',before:'儿子向我推荐黄金蚬和Springlife后，我开始早晚各3粒黄金蚬，并在每天饮水中加入Springlife以改善健康。',after:'有一天我过马路被车撞伤头部，造成瘀伤。医生检查后说几天内会康复。但晚上头痛剧烈。孙子建议我大量饮用Springlife以促进血液循环。第二天早上醒来头不痛了，瘀伤也消失了。太惊讶了！至今我仍服用这两款产品，老年斑和皱纹明显减少。'},
    {img:'testi_1467683221.jpg',name:'Stephy Chua',age:'36',location:'砂拉越',problem:'哮喘（其儿子）',before:'我的儿子从1到3岁就患有支气管敏感，经常去诊所做雾化治疗。他还服用了大量抗生素，导致健康状况恶化，最终发展成哮喘。',after:'尝试Greeno产品后，他的哮喘康复了，之后很少生病。'},
    {img:'testi_1417773258.jpg',name:'Lai Piak Kim',age:'55',location:'砂拉越',problem:'末期鼻癌',before:'2011年我因半面麻木、牙龈酸痛和头痛被诊断出末期鼻癌。癌细胞扩散到肺部和右眼。我仅完成了5周的化疗和放疗（原需7周）。因为身体太虚弱，医生宣布我已时日无多，建议回家。我只能卧床无法翻身，背部开始溃烂。',after:'我开始早午晚各3粒黄金蚬，并每天大量饮用Springlife。还在背部伤口上大量喷洒Springlife。一个月后背部伤口完全愈合，我能在搀扶下行走。两个月后可以自由活动。现在癌细胞已完全消除。医生宣布这是奇迹！'},
    {img:'testi_1445567536.jpg',name:'Lee Chee Seng',age:'54',location:'森美兰',problem:'糖尿病',before:'我患糖尿病多年，血糖曾飙升至17.1mmol/L。长途驾驶时感到疲劳，需频繁停车休息。',after:'2014年11月经姐姐介绍，我开始睡前服用3粒黄金蚬，当时血糖为12.2。几个月后，长途驾驶时整天精力充沛，食欲也改善。2015年2月体检血糖降至7.1。期间我仍然每天喝咖啡、吃甜食。对这个结果非常满意。'},
    {img:'testi_1445567575.jpg',name:'Lee Chwee Peng',age:'47',location:'森美兰',problem:'药物过敏和胃病',before:'我从小就有药物过敏，服用止痛药会导致眼睛肿胀，通常需要几天才能恢复。',after:'2014年2月开始服用黄金蚬和Springlife后，我的药物过敏问题解决了。此外，我对酒精敏感，喝酒后身体会出疹子。但如果在喝酒前服用3粒黄金蚬，问题不再出现。胃病也同时治愈。'},
    {img:'testi_1445567667.jpg',name:'Cheng Ee Ping',age:'23',location:'森美兰',problem:'雀斑',before:'我从小脸上就有雀斑。暴晒后颜色更深。尝试过很多护肤品但无改善。',after:'我每天早晚在饮水中挤4泵Springlife，并在1.5升水中挤6-8泵。仅一个月，雀斑、斑点及肤色就改善了。除了饮用，我还将Springlife以10%比例混合90%水喷在脸上保湿、提亮和防晒，亦有抗菌效果。'},
    {img:'testi_1445567623.jpg',name:'Yau Kwee Yin',age:'70',location:'森美兰',problem:'肾脏萎缩',before:'我因宫颈癌放疗出现尿道炎症和尿血块。大量服药后身体状况恶化。2014年5月发现肾脏萎缩，医生建议透析。',after:'我很害怕，拒绝透析。开始睡前服用2粒黄金蚬并大量饮用Springlife。头几天出现腹泻，持续数日。三个月后，肾功能改善80%，完全无需透析。'},
    {img:'testi_1467623773.jpg',name:'Chan Pau Keong',age:'49',location:'森美兰',problem:'高血糖和炎症性肠病',before:'我血糖偏高（6.4mmol/L）。',after:'我开始睡前服用3粒黄金蚬，每天在饮水中挤3-4泵Springlife。一周后腹痛，我以为是食物中毒不在意。几周后腹痛加剧并发烧。体检发现肠道有小孔和炎症。住院期间大量服用黄金蚬和Springlife。三天后炎症性肠病康复，血糖降至4.9mmol/L。'},
    {img:'testi_1444891727.jpg',name:'Ho Oi Ching',age:'49',location:'沙巴',problem:'咳嗽和背痛',before:'我在服用黄金蚬之前经常咳嗽和背痛。',after:'朋友介绍黄金蚬后，我每天早上服用2-3粒。一个月后，咳嗽和背痛改善很多，肤色也好了，视力也提高了。'},
    {img:'testi_1444881145.jpg',name:'Rachel Lim',age:'37',location:'沙巴',problem:'高血糖',before:'我的血糖指数在9-11mmol/L之间，我开始控制饮食但无改善。',after:'2013年1月20日，在Labuan Aifa酒店参加健康讲座后，我决定服用黄金蚬，每天5-10粒。几天后自行测血糖，指数已降至正常。'},
    {img:'testi_1326164132.jpg',name:'Latifah binti Abdullah',age:'59',location:'槟城',problem:'糖尿病、视力模糊',before:'我患糖尿病近16年。六年前病情加重，脚底有一个50分硬币大小的洞，视力模糊。因血糖高（超过22mmol/L）频繁住院。最近医生因病情严重建议截肢。',after:'2009年10月，孩子推荐GREENO®黄金蚬。我每天服用三粒。现在脚伤慢慢恢复，脚底的洞变小了，脓也干了。医生证实脚部恢复近80%，无需截肢。服用后更健康、精力充沛，视力改善，食欲良好。'},
    {img:'testi_1420263650.jpg',name:'Thio Hang Nei',age:'36',location:'柔佛',problem:'月经问题和胃病',before:'我长期有月经问题。每次经期疼痛到只能卧床。2006年出现另一个健康问题：在人多的地方（公司或商场）会呼吸困难。有一天在工厂晕倒送医，医生诊断为恐慌症。后来改看中医，确认是因胀气引起的喉球症。',after:'2007年朋友介绍GREENO®黄金蚬。前三个月出现月经不调症状，经血从暗红变浅，经痛逐渐减轻。通过GREENO健康讲座学到肝脏知识，意识到喉球症是因10年夜班工作引起。从开始护肝后，喉球症完全康复！仍继续服用作为保健。现在不再有经痛和喉球症，生活更加多姿多彩。'},
    {img:'testi_1326163802.JPG',name:'Jaafar Hj. Jakaria',age:'56',location:'沙巴',problem:'失眠、胃胀、口腔溃疡、高LDL胆固醇、脚底刺痛',before:'我每晚难以入睡。饭后总觉得胃胀不适。胃痛和腹痛几乎每晚把我惊醒。醒来后很难再入睡，第二天感觉睡眠不足和疲倦。此外，几乎每个月都有口腔溃疡，LDL胆固醇高，脚底有刺痛感。',after:'服用GREENO®黄金蚬近两个月后，失眠、胃不适、疲倦和脚底刺痛得到缓解。能轻松入睡，第二天精力充沛。同时LDL胆固醇也降低了！感谢GREENO®黄金蚬！'},
    {img:'testi_1326163731.jpg',name:'Puan Hajjah Dayang Binti Benson',age:'52',location:'沙巴',problem:'贫血、月经问题、瘙痒',before:'我有红细胞问题（贫血），因此每三个月需验血。此外，经常有刺痛感、麻痹和失眠问题。同时月经不调！瘙痒和皮疹也困扰着我的日常活动。',after:'Alhamdulillah，所有疾病尤其是从小折磨我的贫血，在服用GREENO®黄金蚬后得到缓解。使用GREENO®草本Plus卫生巾后月经变得规律！现在我可以自信地享受生活和进行所有日常活动。'},
    {img:'testi_1326163687.jpg',name:'Hajjah Sarkiah Hj. Zakaria',age:'62',location:'沙巴',problem:'风湿、心悸',before:'我经常有风湿问题，尤其在做礼拜时。有时无缘无故心悸，导致呼吸困难。因此去做了心脏检查，但医生诊断没有心脏病。',after:'亲戚介绍GREENO®黄金蚬。前10天早晚各3粒。第一周关节疼痛、呼吸困难。但我坚持服用。在吃完一盒GREENO®黄金蚬之前，风湿和呼吸问题就康复了。现在我能无痛苦地完成礼拜！感谢GREENO®黄金蚬！'},
    {img:'testi_1326111621.jpg',name:'Masne Mokiun',age:'41',location:'沙巴',problem:'子宫癌、严重痘痘',before:'2009年我发现患子宫癌，腹部和子宫经常疼痛。同时整脸长满有脓的痘痘。我开始寻找治疗方法。当时来自亚庇的Puan Dayang向我介绍了GREENO®黄金蚬和GREENO®草本Plus卫生巾。',after:'10月初开始服用GREENO®黄金蚬并使用GREENO®草本Plus卫生巾。第一个月就看到了积极效果，腹部和子宫不再疼痛。服用两个月后脸上痘痘完全康复。见证产品效果后，我决定认真加入GREENO事业帮助需要的人。去年11月还达到了钻石经理级别。感谢GREENO！'},
    {img:'testi_1326109872.JPG',name:'Goh Chai Lai',age:'44',location:'柔佛',problem:'肝硬化、丙型肝炎',before:'我从1990年到2004年吸毒。2008年体检发现患丙型肝炎和肝硬化。当时医生说没有药物可以治愈，因此没有开药。我的脸和皮肤苍白；嘴唇颜色深，眼下有严重黑眼圈。看起来虚弱瘦小，没有食欲、没有精力，每天都困倦疲劳。',after:'2009年9月9日，朋友介绍GREENO®黄金蚬。前5天服用后仍然困倦，但醒来后感觉精力充沛。5天后精神越来越好。一个月后脸和嘴唇变得红润，食欲好转，体重增加。现在每天都能精力充沛地工作。'},
    {img:'testi_1467082593.jpg',name:'Rebecca Liew',age:'36',location:'砂拉越',problem:'免疫系统差、缺氧',before:'从2013年7月认识Bio Greeno以来，我一直使用Spring Life、黄金蚬、HEQ和Cal Plus。从小免疫系统差、缺氧，严重时会晕倒。我喜欢旅行但睡眠质量差甚至失眠，免疫系统也差，旅途必须带很多药物。',after:'自从服用全线产品后，免疫系统增强，睡眠改善。每天早晚各3粒黄金蚬，午饭后2包Cal Plus，Spring Life随时饮用。旅行时随身携带HEQ。现在健康状况良好。'},
    {img:'testi_1467358920.jpg',name:'Yong Chan Siew',age:'39',location:'砂拉越',problem:'失眠、疲劳、敏感鼻子',before:'我失眠超过10年。因此容易发怒、总是疲劳。还有敏感鼻子问题。',after:'仅4粒黄金蚬就感受到效果。我饭后服用2粒，4天后就能入睡。又过两周，敏感鼻子问题解决了，胸痛也消失了。服用黄金蚬期间出现一些好转反应如严重背痛、胃病和眼睛肿胀，让我失去信心。但得到上线建议后我决定继续。现在已恢复正常生活。'},
    {img:'testi_1467681990.JPG',name:'Majnah Binti Abdillah',age:'40',location:'沙巴',problem:'心律不齐、背痛、偏头痛',before:'我有心脏瓣膜问题。虽然做了扩张手术不再需要服药，但有时仍然心律不齐，尤其在劳累或压力大时。每天早晨醒来背部疼痛。还经常偏头痛，通常会持续到第二天。因此被迫服用Panadol或其他止痛药。',after:'服用GREENO®黄金蚬后，即使用力工作心律不齐也没再出现。同时背痛也解决了！现在偏头痛发作时，我闻GREENO®薄荷清新，10到15分钟就缓解。'},
    {img:'testi_1326111679.JPG',name:'Lee Foong Choon',age:'72',location:'彭亨',problem:'糖尿病、中风、高血压、哮喘、肾功能障碍',before:'在服用GREENO®黄金蚬之前，我身上什么病都有！长期糖尿病、高血压和哮喘。血糖曾超过25mmol/L，每天早晚需注射38单位胰岛素。因糖尿病视力越来越模糊。血压曾高达220/100mmHg，属于危险水平。哮喘每周至少两次需入住ICU。完全不能碰水否则哮喘发作。行动不便，走几步就喘。2004年9月中风，手脚麻木，腿部患有湿疹。此外医生还证实一个肾脏需要透析。',after:'2009年10月开始服用GREENO®黄金蚬和N系列N5，每天早晚各3粒黄金蚬和1粒N5。现在情况改善：血糖从>25降至9mmol/L，胰岛素注射减至14单位且不需每天注射。血压降至160/67mmHg。最严重的哮喘不再发作，无需使用哮喘喷雾。腿部湿疹和行动能力改善。医生证实之前需要透析的肾脏已恢复，还可再运作至少两年。住院期间结识不少病友。他们见我服用GREENO®产品后气色越来越好，都问我吃了什么。因为GREENO®黄金蚬和N5，我的健康重新燃起希望！谢谢GREENO！'},
    {img:'testi_1326109757.JPG',name:'Sim Ming Kai',age:'10',location:'柔佛',problem:'眼睛过敏、免疫力弱',before:'从两岁起，Ming Kai就患有眼睛过敏，暴露在污染环境中眼睛会红肿。他瘦小、经常生病如发烧、流感、咳嗽，有时甚至哮喘。此外幼儿园老师还投诉他经常在教室里呕吐。',after:'2007年，Ming Kai的姑姑推荐GREENO®黄金蚬。服用后他发烧、咳嗽并吐出大量痰液。这是好的迹象——表明免疫系统正在杀死病毒和细菌。一周后所有症状停止。食欲变好，身体更强壮，免疫力提高，不再容易生病。最终眼睛过敏也痊愈了。'},
    {img:'testi_1467081443.jpg',name:'Tang Kok Loo@ Tang Ah Bah',age:'68',location:'马六甲',problem:'耳鸣、前列腺问题',before:'服用GREENO®黄金蚬前，我经常有耳鸣和前列腺问题（排尿困难）。这些问题持续约一年。此外用筷子夹菜时左手严重颤抖。孩子说我得了帕金森病，劝我去看医生。但我阅读了许多健康杂志，了解到帕金森病无药可治，可能需要昂贵的医疗费用。杂志建议保持愉快心态和多运动。2009年8月26日，我在网上看到一些GREENO®黄金蚬成功的见证，发现它甚至能治疗帕金森病。于是前往位于蒲种的GREENO中心了解产品信息。经专家解释后我决定购买两盒尝试。',after:'第一周早晚分别服用2粒和3粒GREENO®黄金蚬。头两三天感觉全身发热、头痛欲裂。但我坚持服用！两三天后头不痛了，身体不再发热。从第二周开始减量，早1粒晚2粒。第三周仅晚上服用2粒。耳鸣和手颤症状在第一周后减轻。第三周手颤完全治愈！排尿也顺畅了。见证效果后我开始向亲友推荐，并将继续服用GREENO®黄金蚬！'},
    {img:'testi_1416911583.jpg',name:'Abdul Hisham Bin Saad',age:'38',location:'北海',problem:'糖尿病和脚肿',before:'我患严重糖尿病导致右脚肿胀。因此行走困难，无法久站。此外脚部经常麻木。',after:'我每天饮用15ml Springlife连续10天。因恢复反应，前三天感到头晕、身体瘙痒、疲劳和失眠。但之后脚部麻木改善。随后开始早晚各3粒黄金蚬。仅五天，肿胀部位开始流出又脏又臭的血。现在发炎部位开始收缩并慢慢愈合。'},
    {img:'testi_1417773164.jpg',name:'Muhd. Afif Farhan',age:'4',location:'吉打',problem:'无法行走和久站、经常发烧',before:'从小Afif行走站立困难。因为胫骨异常，脚比正常小。他还经常发烧，脸色苍白如贫血。',after:'服用黄金蚬®和Springlife™两周后，皮肤出现红润，脚和胫骨似乎生长丰满。他开始积极尝试行走。最终能独立行走，脸上重现笑容。'},
    {img:'testi_1417773488.jpg',name:'Nuraisyah Fatihah Bt. Baharuddin',age:'19',location:'吉打',problem:'地中海贫血',before:'我从小被诊断患有地中海贫血。因此经常感觉精力不足和困倦。每月需输血2包，非常痛苦！',after:'服用黄金蚬和Springlife一个月后感觉更有精力。第二个月减少到每月一次输血来补充红细胞。八个月后输血频率降至每两个月一次。'},
    {img:'testi_1417773999.jpg',name:'Thum Siew Sin',age:'82',location:'柔佛',problem:'中风',before:'2012年4月我突然晕倒，被送到诊所检查。医生说我血压过高（超过180），开了一些药。回家后似乎患上痴呆，无法行走。女儿让我服用黄金蚬®和Springlife™，第二天意识恢复。之后另一个女儿带我去医院进一步检查。医生诊断我左侧中风，住院两天。出院后需服用降压药，并定期回院做物理治疗。',after:'家人带我去做针灸治疗。此外每天服用4粒黄金蚬®、2粒Cal Plus和Springlife™。一周后腿能抬起，可以拄拐行走。三个月后能自由活动，还与家人去了云顶高原。感谢Greeno®恢复我的健康。'},
    {img:'testi_1417774213.jpg',name:'Hajah Radziah Zakaria',age:'59',location:'吉打',problem:'糖尿病、高血压、手指麻木',before:'我患糖尿病超过10年，必须注射胰岛素控制血糖。手指经常麻木僵硬，导致无法入睡。此外坐在地上后很难站起来，右大腿和胫骨经常疼痛，精力不足。心脏跳动很快让我不适。',after:'4天内喝完2瓶Springlife®后，手指麻木有所改善。服用黄金蚬®和Springlife®一个月后，无需注射胰岛素就能控制血糖。心跳也恢复正常。现在晚上能睡得更好。谢谢GREENO！'},
    {img:'testi_1417774413.jpg',name:'Lim Yoke Theng',age:'32',location:'柔佛',problem:'甲状腺和不孕',before:'2008年我因双手莫名颤抖、脚红肿被诊断出甲状腺问题。此后每天需服用10粒药物。服药后整天昏睡在床上，不吃饭，甚至因药物过敏送医院。出院后药物增至每天11粒。虽然甲状腺指数下降，但脸上长满痘痘，面容憔悴，每天头晕，无法工作，吃什么都是苦的！我几乎得了神经症，常在半夜哭泣。为减轻痛苦我开始寻求传统治疗和其他保健品，但结果令人失望。因私处难以忍受的疼痛和浮肿，中医曾怀疑我患宫颈癌。近年来虽未避孕仍无法怀孕，我渴望再要一个孩子。经过传统治疗，2010年7月怀孕但9月流产。医生说如果再怀孕流产概率很高。',after:'2010年12月，Greeno蓝钻总监Poh Yin向我介绍产品后，我开始每天早晚各4粒黄金蚬®。效果超乎预期！仅一个月后复查，甲状腺指数恢复正常。同时我再次怀孕！这次因服用黄金蚬®，成功保住了胎儿并平安分娩。现在儿子已经九个月大，健康可爱。我的健康状况也大大改善。'},
    {img:'testi_1417774506.jpg',name:'Nayef Bin Jamaluddin（5个月）',age:'0',location:'玻璃市',problem:'哮喘',before:'Nayef在3个月大时被诊断为婴儿哮喘。此后父母经常带他去诊所做雾化治疗。虽然做了8次治疗，但情况无改善。',after:'2012年5月17日，父亲在收音机听到Greeno产品介绍，于是赶往Holiday Villa酒店见Dr. Zulkifli。他建议Nayef每天服用30滴Springlife™。由于Nayef仍在哺乳，建议母亲每天服用2粒黄金蚬®。感谢上帝！一周后Nayef情况大为改观，不再咳嗽、有痰和流感。还能整夜安睡。5个月时体重从4.3kg增至8.5kg。2012年5月29日月检时值班医生宣布Nayef不再患哮喘。'},
    {img:'testi_1421052228.jpg',name:'Salleh Bin Ali',age:'53',location:'沙巴',problem:'痛风、糖尿病、高血压、胃病',before:'我患痛风、糖尿病超过10年，血压超过200mmHg。因此住院。之后约三个月无法行走。期间需服用痛风、糖尿病、高血压和胃病药物。',after:'住院时朋友介绍GREENO®黄金蚬。我开始早晚各3粒。服用10盒后能够行走，血压降至130/75mmHg，血糖从18mmol/L降至5.4mmol/L。'},
    {img:'testi_1467612241.jpg',name:'Sim Lily',age:'41',location:'柔佛',problem:'中风、高血压、糖尿病、手脚麻木',before:'我10年前患妊娠高血压和糖尿病。需依赖传统草药控制。不幸2008年5月因高血压中风，导致半身不遂、口歪眼斜，无法说话和移动手脚。只能整天卧床。',after:'有人向我丈夫介绍黄金蚬和N5后我开始服用。2天后三根手指能动。10天后神经和口歪问题好转，最终能说话。两个月后手脚可以活动，三个月后完全康复。'},
    {img:'testi_1421052293.jpg',name:'Lee Kin Chong',age:'37',location:'柔佛',problem:'乙型肝炎携带者',before:'10年前献血时发现是乙型肝炎携带者。',after:'2008年5月经朋友介绍开始服用GREENO®黄金蚬。2010年5月体检显示乙肝病毒已清除。我和妻子都非常高兴。另外2009年初妻子怀第三胎时大量服用黄金蚬，儿子出生时头发又浓又黑（前两个儿子出生时头发很少）。三儿子接种疫苗后一年内很少生病。感谢GREENO®黄金蚬如此优秀的产品！'},
    {img:'testi_1421052415.jpg',name:'Siow Kim Chong',age:'63',location:'森美兰',problem:'糖尿病、高血压、甲状腺',before:'我患糖尿病10年，一直在服药。右腿因体内热毒无法消退而肿胀，行走困难。患高血压5-6年，曾因血压高达200mmHg住院输液。此外呼吸困难和甲状腺问题，颈部长有肿瘤。',after:'连续3个月每天早晚各3粒GREENO®黄金蚬。让我惊讶的是肿瘤消失了，连医生都感到震惊。糖尿病和腿部肿胀状况改善。血压从200/降至150/80mmHg。感谢GREENO®黄金蚬卓越的效果让我恢复健康。'},
    {img:'testi_1421052468.jpg',name:'Tham Thoong Seng',age:'69',location:'雪兰莪',problem:'高血压、骨质疏松、鼻窦炎',before:'我已退休，2009年起患有骨质疏松。腿肿胀紧绷。血压高达190mmHg，还有鼻窦炎问题。',after:'2010年1月朋友推荐GREENO®黄金蚬。第一个月我买了60盒，开始早晚各3粒。一周后鼻窦炎和骨质疏松改善，血压降至130mmHg。'},

// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [scrolled, setScrolled] = useState(false);
  const [lang, setLang] = useState(() => {
    try { const s = localStorage.getItem('biogreeno_lang_v2'); if (s==='en'||s==='zh') return s; } catch(e) {}
    return 'zh';
  });

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', onScroll);
    document.body.classList.toggle('lang-zh', lang==='zh');
    document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
    try { localStorage.setItem('biogreeno_lang_v2', lang); } catch(e) {}
    const loader = document.getElementById('loading');
    if (loader) loader.style.display = 'none';
    return () => window.removeEventListener('scroll', onScroll);
  }, [lang]);

  // Update page title based on current page
  useEffect(() => {
    const titles = {
      home: lang==='zh' ? 'BioGreeno — 黄金蚬® 马来西亚授权代理' : 'BioGreeno — Premium Golden Clam® Malaysia',
      'golden-clam': lang==='zh' ? '黄金蚬® — BioGreeno' : 'Golden Clam® — BioGreeno',
      springlife: 'SpringLife® — BioGreeno',
      hualien: lang==='zh' ? '花莲的故事 — BioGreeno' : 'Hualien Story — BioGreeno',
      certifications: lang==='zh' ? '认证与佐证 — BioGreeno' : 'Certifications — BioGreeno',
      testimonials: lang==='zh' ? '见证 — BioGreeno' : 'Testimonials — BioGreeno',
    };
    document.title = titles[page] || 'BioGreeno';
  }, [page, lang]);

  const toggleLang = () => setLang(prev => prev==='en'?'zh':'en');

  const renderPage = () => {
    switch(page) {
      case 'golden-clam':    return <GoldenClamPage lang={lang} setPage={setPage}/>;
      case 'springlife':     return <SpringLifePage lang={lang}/>;
      case 'hualien':        return <HualienPage lang={lang}/>;
      case 'certifications': return <CertificationsPage lang={lang}/>;
      case 'testimonials':   return <TestimonialsPage lang={lang}/>;
      default:               return <HomePage lang={lang} setPage={setPage}/>;
    }
  };

  return (
    <div className="min-h-screen bg-[#F5F1E8] text-[#1F2519]">
      {/* Announcement bar */}
      <div className="bg-[#1F2519] text-[#F5F1E8] text-xs smallcaps py-2.5 text-center px-4">
        {t('announcement', lang)}
      </div>

      <Nav page={page} setPage={setPage} lang={lang} toggleLang={toggleLang} scrolled={scrolled}/>

      <main>{renderPage()}</main>

      <Footer lang={lang} setPage={setPage}/>
      <WAButton/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
